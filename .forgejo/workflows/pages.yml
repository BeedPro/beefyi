name: Deploy Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: codeberg-small
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build-pages

      - name: Deploy to pages branch
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "actions@codeberg.org"

          git checkout pages 2>/dev/null || git checkout --orphan pages
          git rm -rf . || true

          cp -r _site/* .
          [ -f _site/.domains ] && cp _site/.domains .
          rm -rf _site

          git add -A
          git commit -m "Deploy pages" || echo "No changes to commit"
          git push -f origin pages
